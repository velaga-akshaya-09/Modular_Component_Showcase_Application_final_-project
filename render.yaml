databases:
  - name: showcase-db
    databaseName: modular_showcase
    user: postgres
    plan: free

services:
  # ---------------------------------------------------------
  # 1. Frontend (React / Vite)
  # ---------------------------------------------------------
  - type: web
    name: frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: gateway
          envVarKey: RENDER_EXTERNAL_URL

  # ---------------------------------------------------------
  # 2. Gateway (Python FastAPI)
  # ---------------------------------------------------------
  - type: web
    name: gateway
    env: python
    plan: free
    buildCommand: cd gateway && pip install -r requirements.txt
    startCommand: cd gateway && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_URL
        fromService:
          type: web
          name: backend-node
          envVarKey: RENDER_EXTERNAL_URL
      - key: SPRING_BOOT_URL
        fromService:
          type: web
          name: backend-java
          envVarKey: RENDER_EXTERNAL_URL

  # ---------------------------------------------------------
  # 3. Backend Node (Express / MongoDB & PostgreSQL)
  # ---------------------------------------------------------
  - type: web
    name: backend-node
    env: node
    plan: free
    buildCommand: cd backend-node && npm install
    startCommand: cd backend-node && npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_DB
        value: component_showcase
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: showcase-db
          property: connectionString
      - key: MONGO_URI
        value: "mongodb://admin:admin123@ac-fadq7b9-shard-00-00.wjlq0bh.mongodb.net:27017,ac-fadq7b9-shard-00-01.wjlq0bh.mongodb.net:27017,ac-fadq7b9-shard-00-02.wjlq0bh.mongodb.net:27017/component_showcase?ssl=true&replicaSet=atlas-wpw124-shard-0&authSource=admin&retryWrites=true&w=majority"

  # ---------------------------------------------------------
  # 4. Backend Java (Spring Boot / PostgreSQL & MongoDB)
  # ---------------------------------------------------------
  - type: web
    name: backend-java
    env: docker
    plan: free
    dockerContext: backend/coreservices
    dockerfilePath: backend/coreservices/Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: showcase-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: showcase-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: showcase-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: showcase-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: showcase-db
          property: password
      - key: SPRING_DATA_MONGODB_URI
        value: "mongodb+srv://admin:admin123@cluster0.wjlq0bh.mongodb.net/component_showcase?appName=Cluster0"
